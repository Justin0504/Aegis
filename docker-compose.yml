version: '3.8'

# ── AEGIS Quick Start ──────────────────────────────────────────────────────────
# docker compose up -d
# Dashboard  → http://localhost:3000
# Gateway    → http://localhost:8080
# ──────────────────────────────────────────────────────────────────────────────

services:
  gateway:
    build:
      context: .
      dockerfile: ./docker/gateway.Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_PATH: /data/agentguard.db
    volumes:
      - gateway-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cockpit:
    build:
      context: .
      dockerfile: ./docker/cockpit.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      GATEWAY_URL: http://gateway:8080
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gateway-data:
