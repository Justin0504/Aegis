version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - gateway
      - dashboard
    restart: unless-stopped
    networks:
      - agentguard-net

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: agentguard_prod
      POSTGRES_USER: agentguard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backup/postgres:/backup
    restart: unless-stopped
    networks:
      - agentguard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - agentguard-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Gateway Service
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
      target: production
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://agentguard:${DB_PASSWORD:-secure_password}@postgres:5432/agentguard_prod
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
    volumes:
      - ./logs/gateway:/app/logs
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agentguard-net
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  # Dashboard Service
  dashboard:
    build:
      context: .
      dockerfile: docker/cockpit.Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.agentguard.com}
    env_file: .env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - gateway
    networks:
      - agentguard-net
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

  # Backup Service
  backup:
    image: agentguard/backup:latest
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    environment:
      - BACKUP_INTERVAL=${BACKUP_INTERVAL_HOURS:-6}h
      - POSTGRES_CONNECTION=postgresql://agentguard:${DB_PASSWORD}@postgres:5432/agentguard_prod
      - S3_BUCKET=${BACKUP_S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./backup:/backup
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - agentguard-net

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - agentguard-net

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - agentguard-net

networks:
  agentguard-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data: