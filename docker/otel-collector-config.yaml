receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024

  attributes:
    actions:
      - key: environment
        action: upsert
        value: production
      - key: service.namespace
        action: upsert
        value: agentguard

exporters:
  # Console exporter for debugging
  logging:
    loglevel: info

  # Prometheus metrics
  prometheus:
    endpoint: "0.0.0.0:8888"

  # You can add other exporters here:
  # - Jaeger for traces
  # - Elasticsearch for logs
  # - CloudWatch for AWS

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [logging]

    metrics:
      receivers: [otlp]
      processors: [batch, attributes]
      exporters: [prometheus, logging]