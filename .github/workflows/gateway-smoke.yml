name: Gateway Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/gateway-mcp/**'
      - 'packages/core-schema/**'
      - '.github/workflows/gateway-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'packages/gateway-mcp/**'
      - 'packages/core-schema/**'
      - '.github/workflows/gateway-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  gateway-smoke:
    name: Gateway Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install native build tools
        run: sudo apt-get install -y python3 make g++

      - name: Install workspace dependencies
        run: npm ci

      - name: Run gateway smoke tests
        working-directory: packages/gateway-mcp
        run: npm test -- --runInBand
