name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Gateway Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install native build tools
        run: sudo apt-get install -y python3 make g++

      - name: Install (root workspace)
        run: npm ci

      - name: Build core-schema
        working-directory: packages/core-schema
        run: npm run build

      - name: Build
        working-directory: packages/gateway-mcp
        run: npm run build

  cockpit:
    name: Cockpit Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install (root workspace)
        run: npm ci

      - name: Build
        working-directory: apps/compliance-cockpit
        run: npm run build

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: packages/sdk-python
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Build wheel
        working-directory: packages/sdk-python
        run: pip install build && python -m build

  sdk-js:
    name: JS SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install (root workspace)
        run: npm ci

      - name: Build
        working-directory: packages/sdk-js
        run: npm run build

  sdk-go:
    name: Go SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        working-directory: packages/sdk-go
        run: go build ./...

      - name: Vet
        working-directory: packages/sdk-go
        run: go vet ./...
