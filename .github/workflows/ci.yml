name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gateway:
    name: Gateway Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: packages/gateway-mcp
        run: npm ci && npm run build

  cockpit:
    name: Cockpit Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: apps/compliance-cockpit
        run: npm ci && npm run build

  sdk-python:
    name: Python SDK
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        working-directory: packages/sdk-python
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Build wheel
        working-directory: packages/sdk-python
        run: pip install build && python -m build

  sdk-js:
    name: JS SDK Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build
        working-directory: packages/sdk-js
        run: npm ci && npm run build
